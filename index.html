<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 粒子引擎 - 终极多维流体版</title>
    <style>
        body { margin: 0; background: #000; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        
        /* 主控制面板 (调整了最大高度，支持内部滚动以容纳更多参数) */
        #main-panel {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(15, 15, 15, 0.85); padding: 15px; border-radius: 12px;
            border: 1px solid #333; width: 270px; max-height: 90vh; overflow-y: auto;
            backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }
        /* 自定义滚动条 */
        #main-panel::-webkit-scrollbar { width: 6px; }
        #main-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        
        .section { margin-bottom: 12px; }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 0.5px;}
        input[type="file"], select, button { 
            width: 100%; padding: 8px; cursor: pointer; background: #222; 
            color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; transition: 0.2s;
        }
        select { background: #111; color: #00ffcc; font-weight: bold; border-color: #0055aa;}
        button:hover { background: #333; }
        .btn-group { display: flex; gap: 8px; margin-top: 5px; }

        /* 状态与摄像头 */
        #status-bar { position: absolute; top: 15px; right: 300px; text-align: right; pointer-events: none; color: #00ffcc; font-family: monospace; font-size: 14px; text-shadow: 0 0 5px #000;}
        #cam-view { position: absolute; bottom: 15px; right: 15px; width: 180px; height: 135px; border: 2px solid #444; border-radius: 8px; overflow: hidden; background: #000; z-index: 50; }
        video#input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* 使用说明浮窗 */
        #help-panel {
            position: absolute; bottom: 15px; left: 15px; z-index: 100;
            background: rgba(10, 20, 30, 0.95); padding: 20px; border-radius: 12px;
            border: 1px solid #0055ff; width: 340px; backdrop-filter: blur(10px);
            font-size: 12px; line-height: 1.6; color: #ddd; display: none;
        }
        #help-panel h3 { margin: 0 0 10px 0; color: #00aaff; font-size: 15px; border-bottom: 1px solid #0055ff; padding-bottom: 5px; }
        .highlight { color: #00ffcc; font-weight: bold; }
        .help-close { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #fff; font-size: 16px; }
        #help-toggle {
            position: absolute; bottom: 15px; left: 15px; z-index: 99;
            background: #0055ff; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; width: auto; box-shadow: 0 0 10px #0055ff;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

    <div id="main-panel">
        <div class="section">
            <label>1. 上传图片 (自动去背景)</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="section">
            <label>2. 核心场运动 (Base Motion)</label>
            <select id="motion-mode">
                <option value="0">🧊 静态悬浮</option>
                <option value="1">🌊 三维正弦波震荡</option>
                <option value="2">🌀 动态中心涡旋场</option>
                <option value="3">💓 生命呼吸脉冲</option>
                <option value="4" selected>🌫️ 分形噪声漂移</option>
            </select>
        </div>

        <div class="section">
            <label>3. 物理手势引擎 (Physics)</label>
            <select id="engine-mode">
                <option value="0">❌ 关闭物理力学</option>
                <option value="1">🖐️ 基础交互 (推力/聚散)</option>
                <option value="2" selected>🍯 非牛顿流体 (阻力渐进)</option>
            </select>
        </div>

        <div class="section">
            <label>4. 视觉与渲染 (Style)</label>
            <select id="render-style">
                <option value="0">✨ 极光光点</option>
                <option value="1">🔢 赛博矩阵 01</option>
            </select>
        </div>
        
        <div class="section btn-group">
            <button id="start-rec">开始录制</button>
            <button id="stop-rec" disabled>保存视频</button>
        </div>
    </div>

    <!-- 使用说明 -->
    <button id="help-toggle">📖 模式玩法指南</button>
    <div id="help-panel">
        <div class="help-close" id="btn-close-help">✖</div>
        <h3>📖 全新模式玩法指南</h3>
        <p><span class="highlight">💓 呼吸脉冲 (心跳模式)</span><br>
        整体粒子像心脏一样膨胀收缩。<b>交互：</b>当你握拳时，心跳急剧加速，进入狂暴跳动状态；张开手掌则恢复平静心率。</p>
        
        <p><span class="highlight">🌫️ 分形噪声漂移 (烟雾模式)</span><br>
        粒子沿着不可见的 3D 噪声场如烟雾般流淌。<b>交互：</b>你的手掌化身为“引力热源”，手靠近时粒子会被手心吸引并缭绕在指尖。</p>
        
        <p><span class="highlight">🌊 三维正弦波震荡</span><br>
        现在支持在右侧面板独立调节 X/Y/Z 轴的震荡幅度，并支持正负向反转拉伸！</p>
        
        <p><span class="highlight">🌍 自动巡航旋转</span><br>
        在右侧【全局视效】面板，可勾选绕 X/Y/Z 轴自动转动，上帝视角观察立体结构。</p>
    </div>

    <div id="status-bar">GESTURE: <span id="gest-type">NONE</span></div>
    <div id="cam-view"><video id="input_video"></video></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        let scene, camera, renderer, controls, clock;
        let points, material, geometry;
        let posArr, origArr, velArr, typeArr, randArr;
        let gui, mediaRecorder, recordedChunks = [];
        let trailOverlay;

        // 交互与状态数据
        let handPos = new THREE.Vector3(0, 0, 0);
        let targetCenter = new THREE.Vector3(0, 0, 0);
        let curGest = 'NONE';
        let isHandVisible = false;

        // 脉冲系统状态
        let pulsePhase = 0;
        let currentPulseFreq = 1.0;

        // 全局控制参数
        const params = {
            motion: 4,           // 新增到了 4 种模式
            engine: 2,           
            style: 0,            
            pSize: 1.5,
            bgFilter: 0.85,
            trail: 0.15,
            
            // 自动旋转
            spinX: false, spinY: true, spinZ: false,
            spinSpeed: 0.005,
            
            // 1. 波浪参数
            waveX: 0.0, waveY: 3.0, waveZ: 1.5,
            waveSpeed: 2.0,
            
            // 2. 涡旋参数
            vortexSpeed: 5.0,    
            
            // 3. 脉冲参数
            pulseAmp: 0.5,
            pulseBaseFreq: 2.0,
            pulseFastFreq: 15.0, // 握拳狂暴心率
            pulseSlowFreq: 0.5,
            
            // 4. 噪声参数
            noiseAmp: 2.0,
            noiseFreq: 0.5,
            noiseAttract: 3.0,   // 热源吸引力
            
            // 物理交互参数
            brushSize: 4.0,      
            repulsion: 1.5,      
            nonNewtonian: 0.3,   
            returnForce: 0.05,   
            baseDamping: 0.06
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18;

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.autoClearColor = false; 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            clock = new THREE.Clock();

            // 拖尾黑幕层
            const tGeo = new THREE.PlaneGeometry(200, 200);
            const tMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: params.trail, depthTest: false });
            trailOverlay = new THREE.Mesh(tGeo, tMat);
            trailOverlay.position.z = -2;
            trailOverlay.renderOrder = -1; 
            camera.add(trailOverlay);
            scene.add(camera);

            // Shader 负责纯渲染
            material = new THREE.ShaderMaterial({
                uniforms: {
                    uStyle: { value: params.style },
                    uSize: { value: params.pSize },
                    uFistFactor: { value: 0 },
                    uTex01: { value: create01Texture() }
                },
                vertexShader: `
                    uniform float uSize;
                    attribute float aRand; attribute float aType;
                    varying vec3 vCol; varying float vRand; varying float vType;
                    void main() {
                        vCol = color; vRand = aRand; vType = aType;
                        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = uSize * (400.0 / -mvPos.z);
                        gl_Position = projectionMatrix * mvPos;
                    }
                `,
                fragmentShader: `
                    varying vec3 vCol; varying float vRand; varying float vType;
                    uniform float uStyle; uniform sampler2D uTex01; uniform float uFistFactor;
                    void main() {
                        float alpha = 1.0;
                        if (vType < 0.5) {
                            alpha = uFistFactor;
                            if (alpha < 0.05) discard;
                        }
                        if (uStyle > 0.5) {
                            vec2 uv = gl_PointCoord; 
                            uv.x = uv.x * 0.5 + (vRand > 0.5 ? 0.5 : 0.0);
                            vec4 tex = texture2D(uTex01, uv); 
                            if(tex.a < 0.2) discard;
                            gl_FragColor = vec4(vCol * tex.rgb, alpha);
                        } else {
                            float d = distance(gl_PointCoord, vec2(0.5));
                            if(d > 0.5) discard;
                            float r = pow(1.0 - d * 2.0, 1.2);
                            gl_FragColor = vec4(vCol, r * alpha);
                        }
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
            });

            initGUI();
            window.addEventListener('resize', onResize);
            animate();
        }

        function initGUI() {
            gui = new GUI({ title: "⚙️ 物理与运动场调控台" });
            gui.domElement.style.position = 'absolute';
            gui.domElement.style.top = '15px'; gui.domElement.style.right = '15px';

            const f0 = gui.addFolder('全局视效与自转');
            f0.add(params, 'pSize', 0.1, 5.0).name("粒子发光大小").onChange(v => material.uniforms.uSize.value = v);
            f0.add(params, 'trail', 0.0, 0.5).name("残影拖尾程度").onChange(v => {
                trailOverlay.material.opacity = v; renderer.autoClearColor = (v === 0);
            });
            f0.add(params, 'bgFilter', 0.0, 1.0).name("智能去白底强度");
            f0.add(params, 'spinX').name("绕 X 轴自动旋转");
            f0.add(params, 'spinY').name("绕 Y 轴自动旋转");
            f0.add(params, 'spinZ').name("绕 Z 轴自动旋转");
            f0.add(params, 'spinSpeed', 0.001, 0.05).name("旋转速度");

            const f1 = gui.addFolder('🌊 正弦波场');
            f1.add(params, 'waveX', -10.0, 10.0).name("X 轴震荡幅度");
            f1.add(params, 'waveY', -10.0, 10.0).name("Y 轴震荡幅度");
            f1.add(params, 'waveZ', -10.0, 10.0).name("Z 轴震荡幅度");
            f1.add(params, 'waveSpeed', 0.0, 10.0).name("波动速度");

            const f2 = gui.addFolder('🌀 涡旋 / 💓 脉冲 / 🌫️ 噪声');
            f2.add(params, 'vortexSpeed', -15.0, 15.0).name("[涡旋] 旋转角速度");
            f2.add(params, 'pulseAmp', 0.1, 2.0).name("[脉冲] 心脏膨胀幅度");
            f2.add(params, 'noiseAmp', 0.0, 10.0).name("[噪声] 扰动幅度");
            f2.add(params, 'noiseFreq', 0.1, 3.0).name("[噪声] 细节频率");
            f2.add(params, 'noiseAttract', 0.0, 10.0).name("[噪声] 热源吸引力");

            const f3 = gui.addFolder('🖐️ 物理手势引擎');
            f3.add(params, 'brushSize', 1.0, 10.0).name("🖌️ 手势影响半径");
            f3.add(params, 'repulsion', 0.1, 8.0).name("基础斥力/推力");
            f3.add(params, 'nonNewtonian', 0.0, 1.0).name("非牛顿流体增稠");
            f3.add(params, 'returnForce', 0.01, 0.3).name("弹性回位韧度");
            
            f0.close(); f1.close(); f3.close(); // 默认收起部分菜单防止遮挡
        }

        // --- 核心运动与物理引擎 ---
        function updatePhysics() {
            if (!points) return;

            const count = posArr.length / 3;
            const brushSq = params.brushSize * params.brushSize;
            const time = clock.getElapsedTime();
            const dt = clock.getDelta() || 0.016;
            
            // 涡旋平滑中心点
            targetCenter.x += ((isHandVisible ? handPos.x : 0) - targetCenter.x) * 0.05;
            targetCenter.y += ((isHandVisible ? handPos.y : 0) - targetCenter.y) * 0.05;

            // 脉冲系统频率更新
            let targetFreq = params.pulseBaseFreq;
            if (params.motion === 3 && isHandVisible) {
                if (curGest === 'FIST') targetFreq = params.pulseFastFreq;
                else if (curGest === 'OPEN') targetFreq = params.pulseSlowFreq;
            }
            currentPulseFreq += (targetFreq - currentPulseFreq) * 0.05; // 频率平滑过渡
            pulsePhase += currentPulseFreq * dt;
            const pulseScale = 1.0 + params.pulseAmp * Math.sin(pulsePhase);

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const type = typeArr[i];
                
                let vx = velArr[i3], vy = velArr[i3+1], vz = velArr[i3+2];
                let px = posArr[i3], py = posArr[i3+1], pz = posArr[i3+2];
                const ox = origArr[i3], oy = origArr[i3+1], oz = origArr[i3+2];

                // === 1. 目标状态场 (Target Fields) ===
                let tx = ox, ty = oy, tz = oz;

                if (params.motion === 1) { // 🌊 正弦 XYZ
                    tx += Math.sin(oy * 0.5 + time * params.waveSpeed) * params.waveX;
                    ty += Math.sin(ox * 0.5 + time * params.waveSpeed) * params.waveY;
                    tz += Math.cos(ox * 0.5 + time * params.waveSpeed) * params.waveZ;
                } 
                else if (params.motion === 2) { // 🌀 涡旋
                    const dx = ox - targetCenter.x, dy = oy - targetCenter.y;
                    const r = Math.sqrt(dx*dx + dy*dy);
                    const angle = (params.vortexSpeed / (r + 1.0)) * time * 0.5; 
                    const cosA = Math.cos(angle), sinA = Math.sin(angle);
                    tx = targetCenter.x + dx * cosA - dy * sinA;
                    ty = targetCenter.y + dx * sinA + dy * cosA;
                }
                else if (params.motion === 3) { // 💓 呼吸脉冲
                    tx = ox * pulseScale;
                    ty = oy * pulseScale;
                    tz = oz * pulseScale;
                }
                else if (params.motion === 4) { // 🌫️ 分形噪声漂移 (Trig-Noise 逼近)
                    const f = params.noiseFreq;
                    const a = params.noiseAmp;
                    // 高性能伪 3D 流体噪声场
                    tx += Math.sin(oy * f + time) * Math.cos(oz * f + time) * a;
                    ty += Math.sin(oz * f + time) * Math.cos(ox * f + time) * a;
                    tz += Math.sin(ox * f + time) * Math.cos(oy * f + time) * a;
                    
                    // 噪声场专属手势：热源吸引 (手掌像黑洞一样吸入流体)
                    if (isHandVisible) {
                        const hdx = ox - handPos.x, hdy = oy - handPos.y;
                        const dist = Math.sqrt(hdx*hdx + hdy*hdy) || 0.001;
                        if (dist < params.brushSize * 2.0) {
                            const influence = 1.0 - (dist / (params.brushSize * 2.0));
                            tx -= (hdx/dist) * influence * params.noiseAttract;
                            ty -= (hdy/dist) * influence * params.noiseAttract;
                        }
                    }
                }

                // === 2. 物理与手势引擎叠加 ===
                if (params.engine === 0) {
                    px = tx; py = ty; pz = tz;
                    vx = vy = vz = 0;
                } else {
                    // 回位力
                    vx += (tx - px) * params.returnForce;
                    vy += (ty - py) * params.returnForce;
                    vz += (tz - pz) * params.returnForce;

                    // 常规物理手势 (排除被噪声吸引占用的逻辑)
                    if (isHandVisible) {
                        const hdx = px - handPos.x, hdy = py - handPos.y;
                        const distSq = hdx*hdx + hdy*hdy;
                        const dist = Math.sqrt(distSq) || 0.001;

                        if (curGest === 'OPEN') {
                            if (distSq < brushSq) {
                                const f = (1.0 - dist / params.brushSize) * params.repulsion;
                                vx += (hdx / dist) * f * 0.5;
                                vy += (hdy / dist) * f * 0.5;
                            }
                        } else if (curGest === 'FIST') {
                            if (type === 0) {
                                const wave = Math.sin(dist * 3.0 - time * 12.0) * 0.5 + 0.5;
                                vx += (hdx / dist) * wave * 0.5;
                                vy += (hdy / dist) * wave * 0.5;
                            } else {
                                if (distSq < brushSq * 2.0) {
                                    vx -= hdx * 0.05; vy -= hdy * 0.05; 
                                    vx += (Math.random() - 0.5) * 1.0;  
                                    vy += (Math.random() - 0.5) * 1.0;
                                }
                            }
                        }
                    }

                    // 阻尼与剪切增稠
                    let damping = params.baseDamping;
                    if (params.engine === 2) {
                        const speed = Math.sqrt(vx*vx + vy*vy + vz*vz);
                        damping += params.nonNewtonian * (speed * speed);
                    }
                    damping = Math.min(damping, 0.95);

                    vx *= (1.0 - damping); vy *= (1.0 - damping); vz *= (1.0 - damping);
                    px += vx; py += vy; pz += vz;
                }

                if (type === 0 && curGest !== 'FIST' && Math.abs(vx)<0.01 && Math.abs(px-tx)<0.01) {
                    // skip invisibles
                } else {
                    posArr[i3] = px; posArr[i3+1] = py; posArr[i3+2] = pz;
                }
                velArr[i3] = vx; velArr[i3+1] = vy; velArr[i3+2] = vz;
            }
            
            geometry.attributes.position.needsUpdate = true;
        }

        // --- 图片解析 ---
        document.getElementById('upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                    const size = 78; 
                    cvs.width = size; cvs.height = size;
                    ctx.drawImage(img, 0, 0, size, size);
                    const data = ctx.getImageData(0,0,size,size).data;

                    const pos = [], cols = [], typs = [], rands = [];
                    for(let i=0; i<size*size; i++) {
                        const i4 = i * 4;
                        const r = data[i4]/255, g = data[i4+1]/255, b = data[i4+2]/255, a = data[i4+3]/255;
                        
                        const brightness = (r + g + b) / 3;
                        const isBackground = (a < 0.2) || (brightness > params.bgFilter);
                        const x = (i % size - size/2) * 0.22;
                        const y = (size/2 - Math.floor(i/size)) * 0.22;

                        pos.push(x, y, 0);
                        cols.push(r, g, b);
                        typs.push(isBackground ? 0 : 1); 
                        rands.push(Math.random());
                    }

                    if(points) scene.remove(points);
                    geometry = new THREE.BufferGeometry();
                    
                    posArr = new Float32Array(pos);
                    origArr = new Float32Array(pos);
                    velArr = new Float32Array(pos.length);
                    typeArr = new Float32Array(typs);

                    geometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                    geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(cols), 3));
                    geometry.setAttribute('aType', new THREE.BufferAttribute(typeArr, 1)); 
                    geometry.setAttribute('aRand', new THREE.BufferAttribute(new Float32Array(rands), 1));
                    
                    points = new THREE.Points(geometry, material);
                    scene.add(points);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // UI 绑定
        document.getElementById('motion-mode').onchange = e => params.motion = parseInt(e.target.value);
        document.getElementById('engine-mode').onchange = e => params.engine = parseInt(e.target.value);
        document.getElementById('render-style').onchange = e => material.uniforms.uStyle.value = parseInt(e.target.value);

        const helpPanel = document.getElementById('help-panel'), helpToggle = document.getElementById('help-toggle');
        document.getElementById('btn-close-help').onclick = () => { helpPanel.style.display = 'none'; helpToggle.style.display = 'block'; };
        helpToggle.onclick = () => { helpToggle.style.display = 'none'; helpPanel.style.display = 'block'; };

        // MediaPipe 手势
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                isHandVisible = true;
                const lm = res.multiHandLandmarks[0];
                handPos.set((lm[9].x - 0.5) * -22, (0.5 - lm[9].y) * 16, 0);
                const d = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);
                curGest = d < 0.22 ? 'FIST' : 'OPEN';
            } else { 
                isHandVisible = false;
                curGest = 'NONE'; 
            }
            document.getElementById('gest-type').innerText = curGest;
        });
        new Camera(document.getElementById('input_video'), { onFrame: async () => await hands.send({image: document.getElementById('input_video')}), width: 480, height: 360 }).start();

        // 录制视频
        const recStart = document.getElementById('start-rec'), recStop = document.getElementById('stop-rec');
        recStart.onclick = () => {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(renderer.domElement.captureStream(30), { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, {type:'video/webm'}));
                a.download = 'art_fluid.webm'; a.click();
            };
            mediaRecorder.start();
            recStart.innerText = "● 录制中..."; recStart.style.color = "#ff4444";
            recStart.disabled = true; recStop.disabled = false;
        };
        recStop.onclick = () => {
            mediaRecorder.stop();
            recStart.innerText = "开始录制"; recStart.style.color = "white";
            recStart.disabled = false; recStop.disabled = true;
        };

        function create01Texture() {
            const c = document.createElement('canvas'); c.width=128; c.height=64;
            const ctx = c.getContext('2d'); ctx.fillStyle='white'; ctx.font='bold 50px Courier';
            ctx.fillText('0', 20, 50); ctx.fillText('1', 80, 50);
            return new THREE.CanvasTexture(c);
        }

        function onResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            
            if(material) {
                material.uniforms.uFistFactor.value += ((curGest === 'FIST' ? 1.0 : 0.0) - material.uniforms.uFistFactor.value) * 0.15;
            }
            
            // 自动旋转矩阵更新
            if(points) {
                if(params.spinX) scene.rotation.x += params.spinSpeed;
                if(params.spinY) scene.rotation.y += params.spinSpeed;
                if(params.spinZ) scene.rotation.z += params.spinSpeed;
            }
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
